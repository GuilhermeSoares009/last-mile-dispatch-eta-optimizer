openapi: 3.0.3
info:
  title: Last-Mile Dispatch and ETA Optimizer API
  version: 1.0.0
servers:
  - url: http://localhost:8085
paths:
  /api/v1/health:
    get:
      summary: Healthcheck
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/orders:
    post:
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/assignments:
    post:
      summary: Assign courier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentRequest"
      responses:
        "200":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentResponse"
        "409":
          description: Assignment conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/eta/recalculate:
    post:
      summary: Recalculate ETA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecalculateRequest"
      responses:
        "200":
          description: ETA updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalculateResponse"
components:
  schemas:
    OrderRequest:
      type: object
      required: [orderId, pickup, dropoff, priority]
      properties:
        orderId:
          type: string
        pickup:
          type: string
        dropoff:
          type: string
        priority:
          type: string
          enum: [STANDARD, EXPRESS]
    OrderResponse:
      type: object
      properties:
        status:
          type: string
          enum: [CREATED]
    AssignmentRequest:
      type: object
      required: [orderId, candidateIds]
      properties:
        orderId:
          type: string
        candidateIds:
          type: array
          items:
            type: string
    AssignmentResponse:
      type: object
      properties:
        assignmentId:
          type: string
        courierId:
          type: string
        etaMinutes:
          type: integer
    RecalculateRequest:
      type: object
      required: [orderId, reason]
      properties:
        orderId:
          type: string
        reason:
          type: string
    RecalculateResponse:
      type: object
      properties:
        orderId:
          type: string
        etaMinutes:
          type: integer
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP]
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
